<!DOCTYPE html>

<html>
<head>
    <title>Chat Room: {{ room.name }}</title>
</head>
<body>

<h1>Room: {{ room.name }}</h1>

<a href="{% url 'chat:lobby' %}">← Back to Lobby</a>

<hr>

<div id="chat-log">
    {% for message in messages %}
        <div>
            <strong>{{ message.user.username }}:</strong> {{ message.content }}
        </div>
    {% endfor %}
</div>

<br>

<input id="chat-message-input" type="text" placeholder="Type a message..." autocomplete="off">
<button id="chat-message-submit">Send</button>

<script>
const roomName = "{{ room.name }}";

const chatSocket = new WebSocket(
    "ws://" + window.location.host + "/ws/chat/" + roomName + "/"
);

chatSocket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    const message = document.createElement("div");
    message.innerHTML = "<strong>" + data.user + ":</strong> " + data.message;

    document.querySelector("#chat-log").appendChild(message);
};

document.querySelector("#chat-message-submit").onclick = function() {
    const input = document.querySelector("#chat-message-input");
    const message = input.value;

    chatSocket.send(JSON.stringify({
        "message": message
    }));

    input.value = "";
};
</script>

</body>
</html>
